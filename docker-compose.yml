# cấu hình chung cho tất cả thành phần
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow

  environment: &airflow-common-env
  # cách chạy task như thế nào
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

  # quản lý đăng nhập, phân quyền
    AIRFLOW__CORE__AUTH_MANAGER: >-
      airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

  # kết nối postgres(lưu trạng thái hệ thống)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB:-airflow}

  # api cần gọi để phần trong hệ thống chạy các task được phân
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: >-
      http://airflow-api-server:8080/execution/

  # khóa xác thực để các thành phần airflow xác minh để giao tiếp
    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_JWT_SECRET:-replace-with-a-long-random-secret}"
    AIRFLOW__API_AUTH__JWT_ISSUER: "book-data-airflow"

  # mã hóa thông tin nhạy cảm lưu trong database
    AIRFLOW__CORE__FERNET_KEY: "${FERNET_KEY:-replace-with-a-valid-fernet-key}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

  # hỗ trợ hiểu trino và minio đối với code crawl và process
  # thông số của trino
    TRINO_HOST: "trino"
    TRINO_PORT: "8080"
    TRINO_USER: "admin"

  # thống số của minIO
    MINIO_ENDPOINT: "minio:9000"
    MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-admin}"
    MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-password123}"
    MINIO_BUCKET: "${MINIO_BUCKET:-data-lake}"

    PYTHONPATH: "/opt/airflow"
    RAW_DIR: "/opt/airflow/data/raw"
    PROCESSED_DIR: "/opt/airflow/data/processed"
    HEADLESS: "true"

  # lưu trữ dữ liệu của airflow cần được dùng
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./airflow/src:/opt/airflow/src
    - ./airflow/data:/opt/airflow/data

  # The Tiki crawler resolves public APIs from inside the Airflow containers.
  # Explicit resolvers avoid intermittent Docker DNS lookup failures.
  dns:
    - 1.1.1.1
    - 8.8.8.8

  user: "${AIRFLOW_UID:-50000}:0"

  networks:
    - my_data_network

  depends_on:
    airflow-postgres:
      condition: service_healthy


networks:
  my_data_network:
    driver: bridge


volumes:
  airflow_postgres_data:


services:
  # 1. MinIO: Nơi lưu trữ file data (như S3)
  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-password123}"
    command: server /data --console-address ":9001"
    networks:
      - my_data_network
    volumes:
      - ./minio_data:/data

  # 2. Trino: Công cụ truy vấn dữ liệu trên MinIO
  trino:
    image: trinodb/trino:380
    container_name: trino
    volumes:
      - ./trino-etc:/etc/trino
    ports:
      - "${TRINO_HOST_PORT:-8080}:8080"
    networks:
      - my_data_network
    healthcheck:
      disable: true
    # Trino cần config để trỏ vào MinIO, giữ nguyên setup cũ của bạn

  # 3. Superset: Dashboard hiển thị
  superset:
    build: .
    container_name: superset_app
    restart: always
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-replace-with-a-long-random-secret}"
      SUPERSET_LOAD_EXAMPLES: "${SUPERSET_LOAD_EXAMPLES:-no}"
      PYTHONPATH: "/app/pythonpath:/usr/local/lib/python3.10/site-packages"
    volumes:
      - ./superset_data:/app/superset_home
    networks:
      - my_data_network
  
  # lưu dữ liệu cho airflow
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    restart: always

    environment:
      POSTGRES_USER: "${AIRFLOW_POSTGRES_USER:-airflow}"
      POSTGRES_PASSWORD: "${AIRFLOW_POSTGRES_PASSWORD:-airflow}"
      POSTGRES_DB: "${AIRFLOW_POSTGRES_DB:-airflow}"

    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

    networks:
      - my_data_network

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U airflow -d airflow
      interval: 10s
      timeout: 5s
      retries: 5


  # khởi tạo airflow một lần khi chạy
  airflow-init:
    <<: *airflow-common

    container_name: airflow-init

    environment:
      <<: *airflow-common-env

      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_USERNAME:-airflow}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_PASSWORD:-airflow}"

    command: version

    restart: "no"


  # giao diện của airflow
  airflow-api-server:
    <<: *airflow-common

    container_name: airflow-api-server
    command: api-server
    restart: always

    # Trino đã dùng 8080 ở máy host,
    # nên Airflow dùng localhost:8081
    ports:
      - "${AIRFLOW_UI_PORT:-8081}:8080"

    depends_on:
      airflow-postgres:
        condition: service_healthy

      airflow-init:
        condition: service_completed_successfully


  # airflow điều phối task thứ tự thế nào
  airflow-scheduler:
    <<: *airflow-common

    container_name: airflow-scheduler
    command: scheduler
    restart: always

    depends_on:
      airflow-postgres:
        condition: service_healthy

      airflow-init:
        condition: service_completed_successfully


  # airflow phần phân tích kĩ file dag(pipeline gồm các phần task)
  airflow-dag-processor:
    <<: *airflow-common

    container_name: airflow-dag-processor
    command: dag-processor
    restart: always

    depends_on:
      airflow-postgres:
        condition: service_healthy

      airflow-init:
        condition: service_completed_successfully
